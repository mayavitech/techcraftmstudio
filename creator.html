<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Creator Login</title>
</head>

<body>

<script>

document.addEventListener("keydown", function(e){

if(e.ctrlKey && e.key.toLowerCase() === "k"){

e.preventDefault();

const email = prompt("Creator Email");
const pass = prompt("Password");

if(email === "mayu" && pass === "1234"){

window.location.href = "creator/dashboard.html";

}else{

alert("Wrong login");

}

}

});

</script>

<p>Press CTRL + K to login</p>

</body>
</html>
