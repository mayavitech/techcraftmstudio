<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | TechCraftMStudio</title>
  <meta name="description" content="Contact TechCraftMStudio for business inquiries, support, or collaboration.">
  <link rel="icon" href="favicon.png">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HH2VL53WD1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-HH2VL53WD1');
  </script>
</head>

<body>

  <!-- NAVIGATION -->
  <nav id="navbar">
    <div class="nav-inner">
      <div class="logo">TechCraftMStudio</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="videos.html">Videos</a>
        <a href="shop.html">Shop</a>
        <a href="contact.html">Contact</a>
        <a href="downloads.html">Downloads</a>
      </div>
    </div>
  </nav>

  <div id="scroll-progress"></div>

  <!-- MAIN CONTENT -->
  <section class="section-dark">
    <div class="container reveal">
      <h1>Contact Us</h1>
      <p>Have a question or business inquiry? Send a message.</p>

      <form action="https://formsubmit.co/adinadh9yt@gmail.com" method="POST" class="contact-form">

        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message" rows="6" required></textarea>

        <input type="hidden" name="_subject" value="New message from TechCraftMStudio">
        <input type="hidden" name="_captcha" value="false">

        <button type="submit">Send Message</button>
      </form>
    </div>
  </section>

  <!-- SCRIPTS -->
    <!-- ALL PAGE LOGIC -->
  <script>
document.addEventListener("DOMContentLoaded", function () {

  const navbar = document.getElementById("navbar");
  const progressBar = document.getElementById("scroll-progress");

  /* PAGE FADE IN */
  document.body.classList.add("page-loaded");

  /* SCROLL REVEAL */
  function revealElements() {
    const reveals = document.querySelectorAll(".reveal");

    reveals.forEach((element) => {
      const windowHeight = window.innerHeight;
      const elementTop = element.getBoundingClientRect().top;
      const revealPoint = 100;

      if (elementTop < windowHeight - revealPoint) {
        element.classList.add("active");
      }
    });
  }

  window.addEventListener("scroll", revealElements);
  setTimeout(revealElements, 400);

  /* NAVIGATION TRANSITION */
  document.querySelectorAll(".nav-links a").forEach(link => {
    link.addEventListener("click", function (e) {
      const target = this.getAttribute("href");

      if (target && target.includes(".html")) {
        e.preventDefault();
        document.body.classList.remove("page-loaded");

        setTimeout(() => {
          window.location.href = target;
        }, 250);
      }
    });
  });

  /* NAV SCROLL EFFECT + PROGRESS BAR */
  window.addEventListener("scroll", function () {

    if (navbar) {
      if (window.scrollY > 50) {
        navbar.classList.add("nav-scrolled");
      } else {
        navbar.classList.remove("nav-scrolled");
      }
    }

    if (progressBar) {
      let scrollTop = document.documentElement.scrollTop;
      let scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      let progress = (scrollTop / scrollHeight) * 100;
      progressBar.style.width = progress + "%";
    }
  });

});
</script>

</body>
</html>
